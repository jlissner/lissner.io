name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  AWS_ACCESS_KEY_ID: ${{ vars.AWS_ACCESS_KEY_ID }}
  AWS_REGION: ${{ vars.AWS_REGION }}
  DATA_DIR: ${{ vars.DATA_DIR }}
  FIRST_ADMIN_EMAIL: ${{ vars.FIRST_ADMIN_EMAIL }}
  OLLAMA_HOST: ${{ vars.OLLAMA_HOST }}
  OLLAMA_VISION_MODEL: ${{ vars.OLLAMA_VISION_MODEL }}
  S3_BUCKET: ${{ vars.S3_BUCKET }}
  SERVER_HOST: ${{ vars.SERVER_HOST }}
  SERVER_PORT: ${{ vars.SERVER_PORT }}
  SERVER_PROTOCOL: ${{ vars.SERVER_PROTOCOL }}
  SES_FROM_EMAIL: ${{ vars.SES_FROM_EMAIL }}
  UI_PORT: ${{ vars.UI_PORT }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  SESSION_SECRET: ${{ secrets.SESSION_SECRET }}

jobs:
  build:
    runs-on: ubuntu-latest
    environment: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
