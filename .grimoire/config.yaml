version: 1
project:
  commit_style: conventional
  language: typescript
  package_manager: npm
  doc_tool: jsdoc
  comment_style: jsdoc
features_dir: features
decisions_dir: .grimoire/decisions
tools:
  lint:
    name: eslint
    command: npx eslint .
  format:
    name: prettier
    check_command: npx prettier --check .
  build:
    name: build
    check_command: npm run build
  unit_test:
    name: vitest
    command: npx vitest run
  bdd_test:
    name: cucumber
    command: npm run test:bdd
  security:
    name: npm audit
    command: echo "not running audits"
  dep_audit:
    name: npm audit
    check_command: echo "not running audits"
  dead_code:
    name: knip
    command: npx knip
  secrets:
    name: llm
    prompt:
      Review these changed files for hardcoded secrets, API keys, passwords,
      tokens, private keys, or credentials. Flag any string that looks like a
      secret value rather than a placeholder or environment variable reference.
  best_practices:
    name: llm
    prompt: Review these changed files for best practices violations
  duplicates:
    name: jscpd
    command: >-
      npx jscpd --reporters console
      --gitignore
      --ignore "**/package-lock.json"
checks:
  - lint
  - format
  - build
  - duplicates
  - complexity
  - dead_code
  - unit_test
  - bdd_test
  - security
  - dep_audit
  - secrets
  - best_practices
llm:
  thinking:
    command: custom
  coding:
    command: custom
