services:
  app:
    env_file: ".env.prod"
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      - "${SERVER_PORT}:${SERVER_PORT}"
    volumes:
      - app-data:${DATA_DIR}
    environment:
      - NODE_ENV=${NODE_ENV}
      - SERVER_PORT=${SERVER_PORT}
      - OLLAMA_HOST=${OLLAMA_HOST}
      - DATA_DIR=${DATA_DIR}
    # Inject secrets and app config from the host (same file `env.ts` reads locally in production).
    # Compose `--env-file` only affects compose interpolation; it does not pass vars into containers.
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.app.rule=Host(`${SERVER_HOST}`)"
      - "traefik.http.routers.app.entrypoints=web"
      - "traefik.http.routers.app.service=app"
      - "traefik.http.routers.app.tls=true"
      - "traefik.http.routers.app.tls.certResolver=letsencrypt"
      - "traefik.http.routers.app-http.rule=Host(`${SERVER_HOST}`)"
      - "traefik.http.routers.app-http.entrypoints=webhttp"
      - "traefik.http.routers.app-http.middlewares=app-redirect-https@docker"
      - "traefik.http.routers.app-http.service=app"
      - "traefik.http.middlewares.app-redirect-https.redirectscheme.scheme=https"
      - "traefik.http.middlewares.app-redirect-https.redirectscheme.permanent=true"
      - "traefik.http.services.app.loadbalancer.server.port=${SERVER_PORT}"
    depends_on:
      ollama:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:'+(process.env.SERVER_PORT)+'/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 5s
      retries: 3
      # First boot may download a DB from S3 before `listen()`; allow long startup before counting failures.
      start_period: 300s
    restart: unless-stopped
    networks:
      - traefik
      - default

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama-models:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    # Official image has no `curl`; healthcheck uses the `ollama` CLI.
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 120s
    restart: unless-stopped

  traefik:
    image: traefik:v3
    command:
      - "--providers.docker"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:443"
      - "--entrypoints.webhttp.address=:80"
      - "--providers.docker.network=family-image-manager_traefik"
      - "--certificatesresolvers.letsencrypt.acme.tlschallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.email=jlissner@gmail.com" # maybe turn into an environment variable
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
    ports:
      - "443:443" # HTTPS
      - "80:80" # HTTP
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik-certs:/letsencrypt
    networks:
      - traefik
    restart: unless-stopped

volumes:
  app-data:
  ollama-models:
  traefik-certs:

networks:
  traefik:
    driver: bridge
